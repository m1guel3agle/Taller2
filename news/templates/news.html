<!DOCTYPE html>
<html>
<head>
    <title>News</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h1 class="text-center mb-4">Movie News</h1>

<div class="container">

    {% for news in newss %}
    <div class="card mb-3">
        <div class="row g-0">

            <div class="col-md-12">
                <div class="card-body">

                    <h5 class="card-title">
                        {{ news.headline }}
                    </h5>

                    <p class="card-text">
                        {{ news.body }}
                    </p>

                    <p class="card-text">
                        <small class="text-muted">
                            {{ news.date }}
                        </small>
                    </p>

                </div>
            </div>

        </div>
    </div>
    {% endfor %}

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
