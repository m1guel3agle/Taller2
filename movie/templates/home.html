<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

    <h1 class="text-center mb-4">Movie Reviews</h1>

    <!-- Formulario de búsqueda -->
    <form method="get" class="mb-4 d-flex">
        <input type="text" name="searchMovie" class="form-control me-2" placeholder="Search movie">
        <button type="submit" class="btn btn-primary">Search</button>
    </form>

    <!-- Grid responsive -->
    <div class="row row-cols-1 row-cols-md-3 g-4">

        {% for movie in movies %}
        <div class="col">
            <div class="card h-100">

                <!-- Imagen -->
                {% if movie.image %}
                    <img src="{{ movie.image.url }}" class="card-img-top" alt="Movie image">
                {% else %}
                    <img src="/media/movie/images/default.jpg" class="card-img-top" alt="Default image">
                {% endif %}

                <div class="card-body">

                    <h5 class="card-title">{{ movie.title }}</h5>

                    <p class="card-text">
                        {{ movie.description }}
                    </p>

                    <p class="card-text">
                        <strong>Genre:</strong> {{ movie.genre }}
                    </p>

                    <p class="card-text">
                        <strong>Year:</strong> {{ movie.year }}
                    </p>

                    {% if movie.url %}
                        <a href="{{ movie.url }}" class="btn btn-secondary">
                            More info
                        </a>
                    {% endif %}

                </div>
            </div>
        </div>
        {% endfor %}

    </div>

    <!-- Bootstrap JS (para componentes interactivos si luego los usas) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
